name: migrate_jhunt_position
description: 'Migrate jhunt-position: identity migration (unchanged)'
depends_on: []
idempotent: true
source_match: 'match $x isa jhunt-position;

  fetch { "id": $x.id, "jhunt-job-url": $x.jhunt-job-url, "jhunt-short-name": $x.jhunt-short-name,
  "jhunt-salary-range": $x.jhunt-salary-range, "alh-location": $x.alh-location, "jhunt-remote-policy":
  $x.jhunt-remote-policy, "jhunt-team-size": $x.jhunt-team-size, "jhunt-opportunity-status":
  $x.jhunt-opportunity-status, "jhunt-priority-level": $x.jhunt-priority-level, "jhunt-deadline":
  $x.jhunt-deadline };'
target_insert: insert $x isa jhunt-position, has id $id, has jhunt-job-url $jhunt-job-url,
  has jhunt-short-name $jhunt-short-name, has jhunt-salary-range $jhunt-salary-range,
  has alh-location $alh-location, has jhunt-remote-policy $jhunt-remote-policy, has
  jhunt-team-size $jhunt-team-size, has jhunt-opportunity-status $jhunt-opportunity-status,
  has jhunt-priority-level $jhunt-priority-level, has jhunt-deadline $jhunt-deadline;
skolem_keys:
- id
