name: migrate_jhunt_lead
description: 'Migrate jhunt-lead: identity migration (unchanged)'
depends_on: []
idempotent: true
source_match: 'match $x isa jhunt-lead;

  fetch { "id": $x.id, "jhunt-short-name": $x.jhunt-short-name, "jhunt-opportunity-status":
  $x.jhunt-opportunity-status, "jhunt-priority-level": $x.jhunt-priority-level, "jhunt-deadline":
  $x.jhunt-deadline };'
target_insert: insert $x isa jhunt-lead, has id $id, has jhunt-short-name $jhunt-short-name,
  has jhunt-opportunity-status $jhunt-opportunity-status, has jhunt-priority-level
  $jhunt-priority-level, has jhunt-deadline $jhunt-deadline;
skolem_keys:
- id
