# Alhazen Skills Registry
# ========================
# Single source of truth for all skills -- core (path-based) and external (git-based).
#
# Build all skills locally:
#   make build-skills
#
# Update installed skills:
#   make skills-update
#
# Override the skill library URL at build time:
#   make build-skills SKILL_LIBRARY=https://github.com/MyOrg/my-skill-fork
#   ALHAZEN_SKILL_LIBRARY=https://github.com/MyOrg/my-skill-fork make build-skills
#
# Skills resolve to local_skills/ (gitignored build artifact).
#
# Entry formats:
#
#   Core skills (from this repo, symlinked into local_skills/):
#     - name: my-skill
#       path: skills/my-skill       # path relative to repo root
#
#   External skills from the default skill library (inherits defaults.git + defaults.ref):
#     - name: my-skill
#       subdir: skills/category/my-skill
#
#   External skills from a custom git repository:
#     - name: my-skill
#       git: https://...            # overrides defaults.git
#       ref: main                   # overrides defaults.ref (default: main)
#       subdir: .                   # subdirectory within the repo (default: .)
#
# Each skill directory must contain:
#   - SKILL.md     (required: Claude Code skill definition)
#   - skill.yaml   (recommended: structured metadata)
#   - {name}.py    (recommended: CLI entry point)
#   - schema.tql   (optional: TypeDB schema extension -- loaded by make build-db)
#   - dashboard/   (optional: Next.js dashboard components)

# Default skill library -- override with ALHAZEN_SKILL_LIBRARY env var or SKILL_LIBRARY make var
defaults:
  git: https://github.com/sciknow-io/alhazen-skill-examples
  ref: main

skills:
  # -- Core OS components (promoted from skills — managed by CLAUDE.md coordinator) --
  - name: agentic-memory
    path: skills/agentic-memory
    core_os: true
    dashboard:
      enabled: true
      name: "Agentic Memory"
      description: "TypeDB-backed two-tier memory — persons, memory claims, and session episodes."
      url_path: "/agentic-memory"
      icon: Brain
      color: teal

  - name: typedb-notebook
    path: skills/typedb-notebook
    core_os: true

  # -- Domain skills (path-based: symlinked from skills/ in this repo) --------
  - name: web-search
    path: skills/web-search

  - name: curation-skill-builder
    path: skills/curation-skill-builder
    dashboard:
      enabled: true
      name: "Domain Modeling"
      description: "Track skill design processes, decisions, gaps, and experiments across all knowledge domains."
      url_path: "/curation-skill-builder"
      icon: Layers
      color: violet

  - name: scientific-literature
    subdir: skills/biomed/scientific-literature

  # -- External skills (git-based: cloned from defaults.git) ------------------
  - name: jobhunt
    subdir: skills/demo/jobhunt
    dashboard:
      enabled: true
      name: "Job Hunt Dashboard"
      description: "Track job applications, analyze skill gaps, and manage your learning plan."
      url_path: "/jobhunt"
      icon: Briefcase
      color: indigo

  - name: tech-recon
    path: skills/tech-recon
    dashboard:
      enabled: true
      name: "Tech Recon (v2)"
      description: "Goal-driven technology investigation with dynamic Observable Plot analysis."
      url_path: "/tech-recon"
      icon: Search
      color: cyan

  - name: dismech-notebook
    git: https://github.com/GullyBurns/alhazen-skill-dismech
    ref: main
    subdir: plugins/dismech/skills/dismech-notebook
    dashboard:
      enabled: true
      name: "DisMech Notebook"
      description: "Rare disease mechanism knowledge mapped into Alhazen notebook memory."
      url_path: "/dismech"
      icon: Dna
      color: teal

  - name: literature-trends
    subdir: skills/biomed/literature-trends

# -- Compiled schema map (auto-generated by scripts/compile_schema_map.py) ----
# Regenerate with: uv run python scripts/compile_schema_map.py
schema_map:
  load_order:
    - agentic-memory
    - curation-skill-builder
    - jobhunt
    - literature-trends
    - scientific-literature
    - tech-recon
  namespaces:
    dm:
      skill: curation-skill-builder
      schema: skills/curation-skill-builder/schema.tql
      depends_on: []
    jobhunt:
      skill: jobhunt
      schema: local_skills/jobhunt/schema.tql
      depends_on: []
    trend:
      skill: literature-trends
      schema: local_skills/literature-trends/schema.tql
      depends_on: []
    scilit:
      skill: scientific-literature
      schema: local_skills/scientific-literature/schema.tql
      depends_on: []
    tech-recon:
      skill: tech-recon
      schema: skills/tech-recon/schema.tql
      depends_on:
        - scientific-literature
